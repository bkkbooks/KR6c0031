body:
  text: 無著菩薩造隋南天竺三藏法師達摩岌多譯經曰須菩提譬如有人其身妙大須菩提言世尊如來説人身妙大則非大身是故如來説名大身佛言須菩提菩薩亦如是若作是言我當滅度無量衆生則非菩薩佛言須菩提於意云何頗有實法名為菩薩不須菩提言不也世尊實無有法名為菩薩是故佛説一切法無衆生無人無壽者論曰此下第十七為入證道故經言須菩提譬如有人其身妙大如是等顯示入證道時得智慧故離慢云何得智有二種智故一攝種性智二平等智若得智已得生如來家得決定紹佛種此為攝種性智得此已能得妙身於中妙身者謂至得身成就身得畢竟轉依故大身者一切衆生身攝身故若於此家長夜願生既得生已便得彼身是名妙身平等智復有五種平等因緣一麁惡平等二法無我平等三斷相應平等四無希望心相應平等五一切菩薩證道平等得此等故得為大身攝一切衆生大身故於彼身中安立非自非他故經言世尊如來説人身妙大則非大身是故如來説名大身等者於此妙身等中安立第一義如是等是為得智慧云何離慢經言須菩提菩薩亦如是若作是言我當滅度無量衆生等此云何可知若作是念我滅度衆生我是菩薩應知此是慢者非實義菩薩為顯示此故經言是故佛説一切法無衆生等若菩薩有衆生念則不得妙身大身故經曰須菩提若菩薩作是言我莊嚴佛國土是不名菩薩何以故如來説莊嚴佛土莊嚴佛土者即非莊嚴是名莊嚴佛國土須菩提若菩薩通達無我無我法者如來説名真是菩薩菩薩論曰此下第十八上求佛地應知彼地復有六種具足攝轉依具足一國土淨具足二無上見智淨具足三福自在具足四身具足五語具足六心具足為國土淨具足三摩鉢帝故經言須菩提若菩薩作是言我莊嚴佛國土是不名菩薩如是等此義為於共見正行中轉故為斷彼故安立第一義經言即非莊嚴是名莊嚴國土等又經言須菩提若菩薩通達無我無我法者此言為二種無我故謂人無我法無我又經言如來説名菩薩菩薩者為於彼二種無我中二種正覺故此等云何顯示若言我成就即為人我取莊嚴國土者是法我取此非菩薩經曰須菩提於意云何如來有肉眼不須菩提言如是世尊如來有肉眼佛言須菩提於意云何如來有天眼不須菩提言如是世尊如來有天眼佛言須菩提於意云何如來有慧眼不須菩提言如是世尊如來有慧眼佛言須菩提於意云何如來有法眼不須菩提言如是世尊如來有法眼佛言須菩提於意云何如來有佛眼不須菩提言如是世尊如來有佛眼佛言須菩提於意云何如恆河中所有沙佛説是沙不須菩提言如是世尊如來説是沙佛言須菩提於意云何如一恆河中所有沙有如是等恆河是諸恆河所有沙數佛世界如是世界寧為多不須菩提言彼世界甚多世尊佛告須菩提爾所世界中所有衆生若干種心住如來悉知何以故如來説諸心住皆為非心住是名為心住何以故須菩提過去心不可得現在心不可得未來心不可得論曰此下第二為無上見智淨具足故經言須菩提於意云何如來有肉眼不如是等於中二種一為見淨二為智淨如來不唯有慧眼為令知見淨勝故顯示有五種眼若異此則唯求慧眼見淨故於中略説有四種眼謂色攝第一義諦攝世諦攝一切種一切應知攝色攝復有二種謂法界修果此為五眼麁境界故是初色攝第一義智力故世智不顛倒轉是故第一義諦攝在先於中為人説法若彼法為彼人施設此智説名法眼一切應知中一切種無功用智説名佛眼此等名為見淨如經須菩提於意云何如恆河中所有沙如是等此為智淨於中心住者謂三世心若干種者應知有二種謂染及淨即是共欲心離欲心等世者説過去等分於此二中安立第一義故經言如來説諸心住皆為非心住乃至過去心不可得等於中過去心不可得者已滅故未來者未有故現在者第一義故為應知中證故安立見為教彼彼衆生寂靜心故安立智於此智淨中説心住即非心住如是見淨中何故不説眼即非也以一住處故見智淨後安立第一義故初亦得成就經曰須菩提於意云何若有人以滿三千大千世界七寶持用布施是善男子善女人以是因緣得福多不須菩提言如是世尊此人以是因緣得福甚多佛言如是如是須菩提彼善男子善女人以是因緣得福德聚多須菩提若福德聚有實如來則不説福德聚福德聚論曰此下第三為福自在具足故經言須菩提於意云何若有人以滿三千大千世界等於中亦安立第一義故經言須菩提若福德聚有實等經曰須菩提於意云何佛可以具足色身見不須菩提言不也世尊如來不應以色身見何以故如來説具足色身即非具足色身是故如來説名具足色身佛言須菩提於意云何如來可以具足諸相見不須菩提言不也世尊如來不應以具足諸相見何以故如來説諸相具足即非具足是故如來説名諸相具足論曰此下第四為身具足故於中復有二種一為好具足二為相具足為好具足故經言須菩提於意云何佛可以具足色身見不如是等於中亦以安立第一義故經言如來説非具足等為相身具足故經言須菩提於意云何如來可以具足諸相見不如是等經曰佛言須菩提於意云何汝謂如來作是念我當有所説法耶須菩提莫作是念何以故若人言如來有所説法則為謗佛不能解我所説故何以故須菩提如來説法説法者無法可説是名説法論曰此下第五為語具足故經言須菩提於意云何汝謂如來作是念我當有所説法耶如是等於中安立第一義故經言如來説法説法者等經曰爾時慧命須菩提白佛言世尊頗有衆生於未來世聞説是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來説非衆生是名衆生論曰此下第六心具足於心具足中復有六種一為念處二為正覺三為施設大利法四為攝取法身五為不住生死涅槃六為行住淨應知於心具足中為念處故經言世尊頗有衆生於未來世聞説是法生信心不如是等此處於諸衆生中顯示如世尊念處故彼非衆生者第一義故非不衆生者世諦故是人即為希有第一者顯示説第一義是不共及相應故此文如前説經曰佛言須菩提於意云何如來得阿耨多羅三藐三菩提耶須菩提言不也世尊世尊無有少法如來得阿耨多羅三藐三菩提佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無衆生無人無壽者得平等阿耨多羅三藐三菩提修一切善法得阿耨多羅三藐三菩提須菩提所言善法善法者如來説非善法是名善法論曰此下第二於彼心具足中為正覺故經言須菩提於意云何如來得阿耨多羅三藐三菩提耶如是等於中無有法者為離有見過已顯示菩提及菩提道故彼復顯示菩提有二種因緣謂阿耨多羅語故三藐三佛陀語故於中經言無有少法如來得阿耨多羅者此為阿耨多羅語故此顯示菩提自相故菩提解脫相故彼中無微塵許法有體是故亦不可得亦無所有應知經言復次須菩提是法平等者為三藐三佛陀語故顯示菩提者人平等相於中平等者以菩提法故得知是佛此中經言無有高下者顯示一切諸佛第一義中壽命等無高下故經言以無衆生無人無壽者得平等阿耨多羅三藐三菩提者顯示菩提於生死法平等相故經言一切善法得阿耨多羅三藐三菩提者顯示菩提道故經言所言善法善法者如來説非善法是名善法等者此安立第一義相故經曰須菩提三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人説於前福德百分不及一千分不及一百千萬分不及一歌羅分不及一數分不及一優波尼沙陀分不及一乃至算數譬喻所不能及須菩提於意云何汝謂如來作是念我度衆生耶須菩提莫作是見何以故實無有衆生如來度者佛言須菩提若有實衆生如來度者如來則有我人衆生壽者相須菩提如來説有我者則非有我而毛道凡夫生者以為有我須菩提毛道凡夫生者如來説名非生是故言毛道凡夫生論曰此下第三於彼心具足中為施設大利法故經言三千大千世界中所有諸須彌山王如是等於中為安立第一義教授故經言汝謂如來作是念我度衆生耶如是等又經言如來則有我人衆生壽者相等者此有何義如來如爾焰而知是故若有衆生如來則為有我取若實無我而言有我取為離此著故經言須菩提如來説有我者則非有我如是等是故但小兒凡夫有如是取故經言須菩提毛道凡夫生者如來説名非生是故言毛道凡夫生故經曰須菩提於意云何可以相成就得見如來不須菩提言如我解如來所説義不以相成就得見如來佛言如是如是須菩提不以相成就得見如來佛言須菩提若以相成就觀如來者轉輪聖王應是如來是故非以相成就得見如來爾時世尊而説偈言若以色見我以音聲求我是人行邪道不能見如來彼如來妙體即法身諸佛法體不可見彼識不能知須菩提於意云何如來可以相成就得阿耨多羅三藐三菩提耶須菩提莫作是念如來以相成就得阿耨多羅三藐三菩提論曰此下第四於彼心具足中為攝取法身故經言須菩提於意云何可以相成就得見如來不如是等於中初偈顯示如所不應見不可見故云何不可見諸見世諦故是人行邪靜者定名為靜以得禪者説名寂靜者故又復禪名思惟修故於中思者意所攝修者識所攝言寂靜者即説覺及識此世諦所攝應知彼不能見者謂彼世諦行者第二偈顯示如彼不應見及不應因緣謂初分次分於中偈言以法應見佛者法者謂真如義也此何因緣偈言導師法為身故以如為緣故出生諸佛淨身此不可見但應見法故彼不應見復何因緣故不可見以彼法真如相故非如言説而知唯自證知故不如言説者非見實不能知故為顯示此義故偈言法體不可見彼識不能知故於此住處中得顯示以法身應見如來非以相具足故若爾如來雖不應以相具足見應相具足為因得阿耨多羅三藐三菩提為離此著故經言須菩提於意云何如來可以相成就得阿耨多羅三藐三菩提須菩提莫作是念等者此義明相具足體非菩提亦不以相具足為因也以相是色自性故經曰須菩提汝若作是念菩薩發阿耨多羅三藐三菩提心者説諸法斷滅相須菩提莫作是念菩薩發阿耨多羅三藐三菩提心説諸法斷滅相何以故菩薩發阿耨多羅三藐三菩提心者於法不説斷滅相須菩提若善男子善女人以滿恆河沙等世界七寶持用布施若有菩薩知一切法無我得無生法忍此功德勝前所得福德須菩提以諸菩薩不取福德故須菩提白佛言世尊菩薩不取福德佛言須菩提菩薩受福德不取福德是故菩薩取福德論曰此下第五於彼心具足中為不住生死涅槃故於中有二一為不住涅槃二為不住生死為不住涅槃故須菩提汝若作是念菩薩發阿耨多羅三藐三菩提心者説諸法斷滅相如是等於中經言於法不説斷滅者謂如所住法而通達不斷一切生死影像法於涅槃自在行利益衆生事此中為遮一向寂靜故顯示不住涅槃若不住涅槃應受生死苦惱為離此著顯示不住流轉故經言須菩提若善男子善女人以滿恆河沙等世界七寶持用布施如是等於中經言無我無生法忍者何義如來於有為法得自在故無彼生死法我又非業煩惱力生故無生故名無我無生者此中云何得顯示如説攝取餘福尚於生死中不受苦惱何況菩薩於無我無生法中得忍已所生福德勝多於彼經言須菩提以諸菩薩不取福德者此顯示不住生死故若住生死即受福聚又經言須菩提白佛言世尊菩薩不取福德者此有何義以世尊於餘處説應受福聚故經言佛言須菩提菩薩受福德不取福德是故菩薩取福德者此顯示以方便應受而不應取故受者説有故取者修彼道故如福聚及果中皆不應著經曰須菩提若有人言如來若去若來若住若坐若臥是人不解我所説義何以故如來者無所至去無所從來故名如來論曰此下第六於心具足中為行住淨於中復有三種一威儀行住二名色觀破自在行住三不染行住應知為威儀行住故經言須菩提若有人言如來若去若來等於中行者謂去來住者謂餘威儀經曰須菩提若善男子善女人以三千大千世界微塵復以爾許微塵世界碎為微塵阿僧祇須菩提於意云何是微塵衆寧為多不須菩提言彼微塵衆甚多世尊何以故若是微塵衆實有者佛則不説是微塵衆何以故佛説微塵衆則非微塵衆是故佛説微塵衆世尊如來所説三千大千世界則非世界是故佛説三千大千世界何以故若世界實有者則是一合相如來説一合相則非一合相是故佛説一合相佛言須菩提一合相者則是不可説但凡夫之人貪著其事何以故須菩提若人如是言佛説我見人見衆生見壽者見須菩提於意云何是人所説為正語不須菩提言不也世尊何以故世尊如來説我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見須菩提菩薩發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信如是不住法相何以故須菩提所言法相法相者如來説即非法相是名法相論曰此下第二為破名色身自在行住故經言須菩提若善男子善女人以三千大千世界微塵如是等於中細末方便及無所見方便等此破如前説應知經言彼微塵衆甚多世尊者是細末方便經言若是微塵衆實有者佛則不説是微塵衆等者是為無所見方便此説有何義若微塵衆第一義是有者世尊則不説非聚經言佛説微塵衆則非微塵衆是故佛説微塵衆以此聚體不成故若異此者雖不説亦自知是聚何義須説經言如來所説三千大千世界等者此是無所見方便此破名身亦如前説應知於中世界者謂明衆生世故彼唯名身得名故經言若世界實有者則是一合相者於中為並説若世界若微塵界故有二種摶取謂一摶取及差別摶取衆生類衆生世界有者此為一摶取微塵有者此為差別摶取以取微塵衆集故經言如來説一合相則非一合相等者此上座須菩提安立第一義故世尊為成就如是義故經説一合相者即是不可説等此何所顯示世言説故有彼摶取第一義故彼法不可説彼小兒凡夫如言説取非第一義已説無所見方便破義未説無所見中入相應三昧時不分別謂如所不分別及何人何法何方便云何不分別此後具説經言須菩提若人如是言佛説我見等此等顯示如所不分別云何得顯示如外道説我如來説為我見故安置人無我又為説有此我見故安置法無我若有彼我見是見所攝如是觀察菩薩入相應三昧時不復分別即此觀察為入方便經言須菩提菩薩發阿耨多羅三藐三菩提心者此顯示無分別人經言於一切法者此顯示於何法不分別經言應如是知如是見如是信者此顯示增上心增上智故於無分別中知見勝解於中若智依止奢摩他故知依止毗鉢舍那故見此二依止三摩提故勝解以三摩提自在故解內攀緣影像彼名勝解經言如是不住法相者此正顯示無分別經言所言法相法相者如來説即非法相是名法相者此顯示法相中不共義及相應義如前已説如是一切住處中相應三摩提方便亦爾應知欲願及攝散二種如前所説更無別義是故不復説其方便經曰須菩提若有菩薩摩訶薩以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩薩心者於此般若波羅蜜經乃至四句偈等受持讀誦為他人説其福德勝彼無量阿僧祇云何為人演説而不名説是名為説一切有為法如星翳燈幻露泡夢電雲應作如是觀論曰此下第三為不染行住於中二種一為説法不染二為流轉不染為説法不染故經言須菩提若有菩薩摩訶薩以滿無量阿僧祇世界七寶如是等此何所顯示以有如是大利益故決定應演説如是演説而無所染經言云何為人演説而不名説是名為説者此有何義顯示不可言説故不演説彼法有可説體應如是演説若異此者則為染説以顛倒義故又如是説時不求信敬等亦為無染説法為流轉無染故經説偈言一切有為法如星翳燈幻等此偈顯示四種有為相一自性相二者所住味相三隨順過失相四隨順出離相於中自性相者共相見識此相如星應如是見何以故無智暗中有彼光故有智明中無彼光故人法我見如翳應如是見何以故以取無義故識如燈應如是見何以故渴愛潤取緣故熾然於中著所住味相者味著顛倒境界故彼如幻應如是見何以故以顛倒見故於中隨順過失相者無常等隨順故彼露譬喻者顯示相體無有以隨順無常故彼泡譬喻者顯示隨順苦體以受如泡故若有受皆是苦以三苦故隨有應知彼苦生故是苦苦破滅故是壞苦不相離故是行苦復於第四禪及無色中立不苦不樂受以勝故於中隨順出離相者隨順人法無我以攀緣故得出離故説無我以為出離也隨順者謂過去等行以夢等譬喻顯示彼過去行以所念處故如夢現在者不久時住故如電未來者彼麁惡種子似虛空引心出故如雲如是知三世行轉生已則通達無我此顯示隨順出離相故經曰佛説是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷菩薩摩訶薩一切世間天人阿修羅乾闥婆等聞佛所説皆大歡喜信受奉行論曰偈言若聞如是義於大乘無覺我念過於石究竟無因故下人於深法不能覺及信世人多如此是故法荒廢
