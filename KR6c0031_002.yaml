body:
  text: 無著菩薩造隋南天竺三藏法師達摩岌多譯經曰須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故實無有法名須陀洹不入色聲香味觸法是名須陀洹佛言須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故實無有法名斯陀含是名斯陀含須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故實無有法名阿那含是名阿那含須菩提於意云何阿羅漢能作是念我得阿羅漢果不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢即為著我人衆生壽者世尊佛説我得無諍三昧最為第一世尊説我是離欲阿羅漢世尊我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢世尊則不記我無諍行第一以須菩提實無所行而名須菩提無諍無諍行論曰此下第五為修道得勝中無慢如前略為八種住處已下十二總名離障礙住處對治應知何者十二障礙一慢二無慢而少聞三多聞而小攀緣作念修道四不小攀緣作念修道而捨衆生五不捨衆生而樂隨外論散動六雖不散動而破影像相中無巧便七雖有巧便而福資糧不具八雖具福資糧而樂味懈怠及利養等九雖離懈怠利養而不能忍苦十雖能忍苦而智資糧不具十一雖具智資糧而不自攝十二雖能自攝而無教授此中為離慢故經言須陀洹能作是念我得須陀洹果不等此為依義顯示對治我得慢故又復須陀洹能作是念者即為説相顯示無慢故亦即是欲願攝持經言世尊實無有法不入色聲香味觸者此為安立第一義若須陀洹如是念我得須陀洹果即為有我想若有我想則為有慢應知如是乃至阿羅漢亦爾上座須菩提自顯無諍行第一及離欲阿羅漢共有功德者以己所證為令信故以無有法得阿羅漢及無所行故説無諍無諍行此中即為安立第一義經曰佛告須菩提於意云何如來昔在然燈佛所得阿耨多羅三藐三菩提法不須菩提言不也世尊如來在然燈佛所於法實無所得阿耨多羅三藐三菩提論曰此下第六為不離佛出時依離障礙十二種中為離少聞故經言如來昔在然燈佛所得阿耨多羅三藐三菩提法不等謂彼佛出世承事供養時有法可取離此分別故依義等及對治等隨義相應應知經曰佛告須菩提若菩薩作是言我莊嚴佛國土彼菩薩不實語何以故須菩提如來所説莊嚴佛土者則非莊嚴是名莊嚴佛土是故須菩提諸菩薩摩訶薩應如是生清淨心而無所住不住色生心不住聲香味觸法生心應無所住而生其心論曰此下第七為願淨佛土依離障礙十二種中為離小攀緣作念修道故經言須菩提若菩薩作是言我莊嚴佛國土等若念嚴淨土者則於色等事分別生味著為離此故經言是故須菩提諸菩薩摩訶薩應如是生清淨心而無所住不住色聲香味觸法等經曰須菩提譬如有人身如須彌山王須菩提於意云何是身為大不須菩提言甚大世尊何以故佛説非身是名大身彼身非身是名大身論曰此下第八為成熟衆生依離障礙十二種中為離捨衆生故經言須菩提譬如有人身如須彌山王如是等此何所顯示為成熟欲界衆生故彼羅睺阿修羅王等一切大身量如須彌尚不應見其自體何況餘者經言如來説為非體者顯示法無我故彼體非體者顯示法體無生無作故此即顯示自性與相及差別故經曰佛言須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙佛言須菩提我今實言告汝若有善男子善女人以七寶滿爾數恆沙數世界以施諸佛如來須菩提於意云何彼善男子善女人得福多不須菩提言甚多世尊彼善男子善女人得福甚多佛言須菩提以七寶滿爾數恆河沙世界持用布施若善男子善女人於此法門乃至受持四句偈等為他人説而此福德勝前福德無量阿僧祇復次須菩提隨所有處説是法門乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟何況有人盡能受持讀誦此經須菩提當知是人成就最上第一希有之法若是經典所在之處則為有佛若尊重似佛爾時須菩提白佛言世尊當何名此法門我等云何奉持佛告須菩提是法門名為金剛般若波羅蜜以是名字汝當奉持何以故須菩提佛説般若波羅蜜則非般若波羅蜜須菩提於意云何如來有所説法不須菩提言世尊如來無所説法論曰此下第九為遠離隨順外論散亂依離障礙十二種中為離樂外論散亂故經説四種因緣顯示此法勝異也一攝取福德二天等供養三難作四起如來等念經言須菩提如恆河中所有沙數等者是攝取福德經言須菩提隨所有處説是法門等者是天等供養經言須菩提當知是人成就最上第一希有等者是難作經言若是經典所在之處等者是起如來等念於中説者為他直説故授者教授他故顯示此樂外論散亂對治法勝異已於如是法中或起如言執義為對治彼未來罪故經言佛説般若波羅蜜則非般若波羅蜜故如般若波羅蜜非波羅蜜如是亦無有餘法如來説者為顯此義故經言須菩提於意云何如來有所説法不此顯示自相及平等相法門第一義也經曰須菩提於意云何三千大千世界所有微塵是為多不須菩提言彼微塵甚多世尊須菩提是諸微塵如來説非微塵是名微塵如來説世界非世界是名世界論曰此下第十明色及衆生身摶取中觀破相應行依離障礙十二種中為離於影像相自在中無巧便故經言須菩提於意云何三千大千世界所有微塵如是等彼不限量攀緣作意菩薩恆於世界攀緣作意修習故説三千大千世界於中為破色身影像相故顯示二種方便一細作方便如三千大千世界所有微塵寧為多不等二不念方便如經是諸微塵如來説非微塵是名微塵故為破衆生身影像相故經言如來説世界非世界是名世界故於中世界顯衆生世也但以名身名為衆生世不念名身方便即是顯示破彼影像相不復説細作方便也經曰佛言須菩提於意云何可以三十二大人相見如來不須菩提言不也世尊何以故如來説三十二大人相即是非相是名三十二大人相論曰此下第十一明供養給侍如來依離障礙十二種中為離不具福資糧故經言於意云何可以三十二大人相見如來不者顯示為福資糧故親近供養如來時不應以相成就見如來云何見應見第一義法身故經曰佛言須菩提若善男子善女人以恆河沙等身命布施若復有人於此法門中乃至受持四句偈等為他人説其福甚多無量阿僧祇爾時須菩提聞説是經深解義趣涕淚悲泣捫淚而白佛言希有婆伽婆希有修伽陀佛説如是甚深法門我從昔來所得慧眼未曾得聞如是法門何以故須菩提佛説般若波羅蜜即非般若波羅蜜世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德世尊是實相者則是非相是故如來説名實相實相世尊我今得聞如是法門信解受持不足為難若當來世其有衆生得聞是法門信解受持是人則為第一希有何以故此人無我相人相衆生相壽者相何以故我相即是非相人相衆生相壽者相即是非相何以故離一切諸相則名諸佛佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有何以故須菩提如來説第一波羅蜜非第一波羅蜜如來説第一波羅蜜者彼無量諸佛亦説波羅蜜是名第一波羅蜜論曰此下第十二遠離利養及疲乏熱惱故不起精進及退失等依離障礙十二種中為離懈怠利養等樂味故經言須菩提若有善男子善女人以恆河沙等身命布施如是等於中身有疲乏心有熱惱以此二種於彼精進若退若不發此何所顯示如此捨爾許身自所有福不及此福云何以一身著懈怠等故而為障礙何故此中上座須菩提流淚而言我未曾聞如是等法門也以聞此勝福甚多過於捨無量身更不説餘勝福故若聞如是勝福故發起精進已若於此法中生如義想為離此過故經言若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德等即於如是實相中為離實相分別故經言是實相者即是非相如是等經言世尊我今得聞如是法門信解受持不足為難若當來世其有衆生得聞是法門信解受持是人則為第一希有如是等此何義為令味著利養過懈怠諸菩薩生慚愧故於未來正法滅時尚有菩薩於此法門受持故無人等取及法取云何汝等於正法興時遠離修行不生慚愧也經言此人無我相人相衆生相壽者相者顯示無人取也我相即非相等者顯示無法取也經言何以故離一切諸相即名諸佛者顯示諸菩薩順學相諸佛世尊離一切相是故我等亦應如是學此等經文為離退精進故説於中言若分別若信解者後句釋前句也受者受文字也持者持義也為離不發起精進故經言若復有人得聞是經不驚不怖不畏等者以驚等故不發起精進也於聲聞乘中世尊説有法及有空於聽聞此經時聞法無有故驚聞空無有故怖於思量時於二不有理中不能相應故畏更有別釋為三種無自性故應知謂相生第一義等無自性故經言何以故須菩提如來説第一波羅蜜非第一波羅蜜者此有何義復説第二生慚愧處故言此法如是勝上汝等不應放逸於中以於餘波羅蜜中勝故名第一波羅蜜又經言如來説第一波羅蜜者彼無量諸佛亦説波羅蜜者此言顯示一切諸佛同説第一是故名第一經曰須菩提如來説忍辱波羅蜜即非忍辱波羅蜜何以故須菩提如我昔為歌利王割截身體我於爾時無我相無衆生相無人相無壽者相無相亦非無相何以故須菩提我於往昔節節支解時若有我相衆生相人相壽者相應生瞋恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無衆生相無人相無壽者相是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心何以故若心有住則為非住不應住色生心不應住聲香味觸法生心應生無所住心是故佛説菩薩心不住色布施須菩提菩薩為利益一切衆生應如是布施須菩提言世尊一切衆生相即非相何以故如來説一切衆生即非衆生須菩提如來是真語者實語者如語者不異語者須菩提如來所得法所説法無實無妄語須菩提譬如有人入暗則無所見若菩薩心住於事而行布施亦復如是須菩提譬如人有目夜分已盡日光明照見種種色若菩薩不住於事行於布施亦復如是論曰此下第十三明忍苦依離障礙十二種中為離不能忍苦故經言須菩提如來説忍辱波羅蜜等於中有二一能忍二離不能忍能忍有三一如所能忍二忍相三種類忍於中如所能忍以何相生忍處如忍差別顯示對治彼因緣故何者能忍謂達法無我故云何得顯示如經言如來説忍辱波羅蜜即非忍辱波羅蜜故云何應知忍相若他於己起惡等時由無有我等相故不生瞋想亦不於羼提波羅蜜中生有想於非波羅蜜中生無想此云何顯示經言如我昔為歌利王割截身體我於爾時無有我等相及無相亦非無相等故何者種類忍亦有二種一極苦忍二相續苦忍此云何顯示經言須菩提我於往昔節節支解時若有我相應生瞋恨等云何相續苦忍經言須菩提又念過去於五百世作忍辱仙人等不忍因緣者有三種苦一流轉苦二衆生相違苦三乏受用苦於中經言是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心等此為顯示流轉苦忍因緣對治發菩提心者以三種苦相故則不欲發心故説應離一切相等此中一切相者為顯如是等三苦相也若著色等則於流轉苦中疲乏故菩提心不生故經言不住色生心等如前説不住非法者謂非法無我也於非法及法無我中皆不住故為成就彼諸不住故説遮餘事經言應生無所住心何以故若有心住即為非住等經言須菩提菩薩為利益一切衆生應如是布施乃至一切衆生即非衆生等此顯示對治衆生相違苦忍即為一切衆生而行於捨云何於彼應生瞋也由不能無衆生及衆生想以此因緣故衆生相違時即生疲乏故顯示人無我法無我等經言須菩提如來是真語者等此何所顯示欲令信如來故能忍於中真語者為顯世諦相故實語者為顯世諦修行有煩惱及清淨相故於中實者此行煩惱此行清淨故如語者為第一義諦相故不異語者為第一義諦修行有煩惱及清淨相故説此真語等已於此中如言説性起執著為遣此故經言須菩提如來所得法所説法無實無妄語故無實者如言説性非有故無妄者不如言説自性有故經言須菩提譬如有人入暗如是等顯示乏受用苦忍因緣對治若為果報布施便著於事而行捨施於彼喜於欲樂苦受中不解出離猶如入暗不知我何所趣彼喜欲樂亦爾若不著於事而行布施如有眼丈夫夜過日出見種種色隨意所趣應如是見彼無明夜過慧日出已種種爾焰如實見之彼不知解出離欲樂苦受故喜樂欲樂經曰復次須菩提若有善男子善女人能於此法門受持讀誦修行則為如來以佛智慧悉知是人悉見是人悉覺是人皆得成就無量無邊功德聚須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分復以恆河沙等身布施如是捨恆河沙等無量身如是百千萬億那由他劫以身布施若復有人聞此法門信心不謗其福勝彼無量阿僧祇何況書寫受持讀誦修行為人廣説須菩提以要言之是經有不可思議不可稱量無邊功德此法門如來為發大乘者説為發最上乘者説若有人能受持讀誦修行此經廣為人説如來悉知是人悉見是人皆成就不可思議不可稱無有邊無量功德聚如是人等則為荷擔如來阿耨多羅三藐三菩提何以故須菩提若樂小法者則於此經不能受持讀誦修行為人解説若有我見衆生見人見壽者見於此法門能受持讀誦修行為人解説者無有是處須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處復次須菩提若善男子善女人受持讀誦此經為人輕賤何以故是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提須菩提我念過去無量阿僧祇阿僧祇劫於然燈佛前得值八千四億那由他百千萬諸佛我皆親承供養無空過者須菩提如是無量諸佛我皆親承供養無空過者若復有人於後世末世能受持讀誦修行此經所得功德我所供養諸佛功德於彼百分不及一千萬億分乃至算數譬喻所不能及須菩提若有善男子善女人於後世末世有受持讀誦修行此經所得功德若我具説者或有人聞心則狂亂疑惑不信須菩提當知是法門不可思議果報亦不可思議論曰此下第十四離寂靜味依離障礙十二種中為離闕少智資糧故經言復次須菩提若有善男子善女人能於此法門受持讀誦修行等此中為離三摩提攀緣顯示與法相應有五種勝功德一如來憶念親近二攝福德三讚歎法及修行四天等供養五滅罪何者如來憶念親近經言受持讀誦等如來以佛智知彼如來以佛眼見彼等於中受者習誦故持者不妄故若讀若誦者此説受持因故為欲受故讀為欲持故誦又復讀者習誦故持者總覽義故何者攝福德經言皆得成就無量無邊功德聚等何者讚歎法及修行經言須菩提以要言之是經有不可思議不可稱量等此為讚歎法於中不可思者唯自覺故不可稱者無有等及勝故經言此法門如來為發大乘者説為發最上乘者説者此成就不可稱義於中餘乘不及故最上煩惱障智障淨故最勝應知經言若有人能受持讀誦修行此經廣為人説等者此為讚歎修行於中如來知見成就無量功德聚者是總説也不可思不可稱不可量者解釋故如是人等則為荷擔如來阿耨多羅三藐三菩提者謂肩負菩薩重擔故經言須菩提若樂小法者則於此經不能受持讀誦修行為人解説者謂聲聞獨覺乘者故經言若有我等見乃至受持無有是處者謂有人我見衆生而自謂菩薩者故何者天等供養經言須菩提在在處處若有此經一切世間天人阿修羅所應供養等者於中以華鬘燒香薰香塗香末香衣蓋幢幡等供養恭敬禮拜右繞故名支提何者滅罪經言若善男子善女人受持讀誦此經為人輕賤等故者此毀辱事有無量門為顯示此故説輕賤經言當得阿耨多羅三藐三菩提者顯示滅罪故前所説以此因緣出生無量阿僧祇多福者今當解釋彼無量阿僧祇義應知威力者成熟熾然故多者具足故於中經言須菩提我念過去無量阿僧祇阿僧祇劫等者此顯示威力故即是福聚威力以彼所有福聚遠絶高勝故此中阿僧祇劫者乃至然燈佛故應知過阿僧祇者更過前故親承者供養故不空過者常不離供養故經言須菩提若有善男子善女人於後末世有受持讀誦修行此經所得功德若我具説者或有人聞心則狂亂如是等此顯示多故或為狂因或得亂心果應知此之彼威力及彼多等何人能説是故經言須菩提當知是法門不可思議果報亦不可思議此顯示彼福體及果不可測量故經曰爾時須菩提白佛言世尊云何菩薩發阿耨多羅三藐三菩提心云何住云何修行云何降伏其心佛告須菩提菩薩發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生令入無餘涅槃界如是滅度一切衆生已而無一衆生實滅度者何以故須菩提若菩薩有衆生相人相壽者相則非菩薩何以故須菩提實無有法名為菩薩發阿耨多羅三藐三菩提心者論曰此下第十五於證道時遠離喜動依離障礙十二種中為遠離自取故經言須菩提白佛言世尊云何菩薩發菩提心住修行等何故復發起此初時問也將入證道菩薩自見得勝處作是念我如是住如是修行如是降伏心我滅度衆生為對治此故須菩提問當於彼時如所應住如所修行如所應降伏心及世尊答當生如是心等又經言須菩提若菩薩有衆生等者為顯我執取或隨眠故若言我正行菩薩乘此為我取對治彼故經言須菩提實無有法名為菩薩發阿耨多羅三藐三菩提心者經曰須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不須菩提白佛言不也世尊如我解佛所説義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來於然燈佛所得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作如是言摩那婆汝於來世當得作佛號釋迦牟尼何以故須菩提言如來者即實真如須菩提若有人言如來得阿耨多羅三藐三菩提者是人不實語須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中不實不妄語是故如來説一切法皆是佛法須菩提所言一切法一切法者即非一切法是故名一切法論曰此下第十六求教授依離障礙十二種中為離無教授故經言須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不如是等又經言須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記汝於來世當得作佛等此有何意若菩提法可説如彼然燈如來所説者我於彼時便得菩提然燈如來則不授記言我得等以彼法不可説故我於彼時不得菩提是故與我授記此是其義應知又何故彼法不可説經言須菩提言如來者即實真如故如清淨故名為如來以如不可説故作此説清淨如名為真如猶如真金或言然燈如來所於法不得菩提世尊後時自得菩提為離此取故經言須菩提若有人言如來得阿耨多羅三藐三菩提者是人不實語等故又經言須菩提如來所得阿耨多羅三藐三菩提於是中不實不妄語者顯示真如無二故云何不實謂言説故不妄者謂彼菩提不無世間言説故經言是故如來説一切法皆是佛法者此何義顯一切法法如清淨故如者遍一切法故此是其義又彼一切法法體不成就為安立第一義故經言須菩提所言一切法一切法者即非一切法是名一切法故
